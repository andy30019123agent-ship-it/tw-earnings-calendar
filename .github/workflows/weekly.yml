name: weekly-calendar

on:
  schedule:
    # 整點 cron 在 GitHub 高峰常被延遲數小時甚至丟包（2026-07-04 實測：上週延 7 小時、本週整個沒跑）
    # → 錯開到冷門分鐘＋多重保險；靠 run_weekly 的冪等旗標（notify_state.json）不會重複推播
    - cron: "26 2 * * 6"  # UTC 週六 02:26 = 台北週六 10:26（主檔）
    - cron: "26 4 * * 6"  # 台北週六 12:26（保險一）
    - cron: "26 7 * * 6"  # 台北週六 15:26（保險二）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 掃描並推播
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scripts.run_weekly

      - name: 回寫 latest.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/latest.json data/shares_cache.json data/industry_cache.json data/notify_state.json || true
          git commit -m "data: 更新下週行事曆 [skip ci]" || echo "無變更"
          git push || true
