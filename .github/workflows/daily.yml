name: daily-remind

on:
  schedule:
    # 整點/熱門分鐘的 cron 常被 GitHub 延遲或丟包（2026-07-04 當天 03:00 與 03:40 都沒跑）
    - cron: "26 3 * * *"  # UTC 03:26 = 台北 11:26
    - cron: "26 5 * * *"  # 台北 13:26 保險重試；靠冪等旗標不會重複推
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 核對本週法說會異動（新增／取消／改期）
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scripts.run_daily_diff

      - name: 推每日到期提醒
        if: ${{ always() }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scripts.run_daily_remind

      - name: 回寫 picks.json／latest.json／notify_state.json
        if: ${{ always() }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/picks.json data/latest.json data/notify_state.json || true
          git commit -m "data: 更新 picks 狀態／法說會異動／當日廣播旗標 [skip ci]" || echo "無變更"
          git push || true
