name: daily-remind

on:
  schedule:
    - cron: "0 3 * * *"   # UTC 每日 03:00 = 台北每日 11:00
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 推每日到期提醒
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python -m scripts.run_daily_remind

      - name: 回寫 picks.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/picks.json || true
          git commit -m "data: 更新 picks 狀態 [skip ci]" || echo "無變更"
          git push || true
