name: deploy-pages
on:
  push:
    branches: [main]
    paths: ["web/**", "data/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:
  # GITHUB_TOKEN 回寫的 commit 不會觸發 push 事件，
  # 所以 weekly／daily 更新 data 後改由 workflow_run 帶動部署
  workflow_run:
    workflows: ["weekly-calendar", "daily-remind"]
    types: [completed]
permissions: { contents: read, pages: write, id-token: write }
# 同一時間只留最新一次部署，避免 push 與 workflow_run 同時觸發互相打架
concurrency:
  group: pages-deploy
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: web/dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages }
    steps:
      - uses: actions/deploy-pages@v4
